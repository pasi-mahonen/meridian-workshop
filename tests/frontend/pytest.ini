[pytest]
testpaths = meridian
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: Smoke tests
    regression: Regression tests

addopts =
    --html=test-results/report.html
    --self-contained-html
    -v
    --tb=short
    --strict-markers
    --output=playwright-traces

base_url = http://localhost:3000
